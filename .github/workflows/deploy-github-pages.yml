name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      # Secrets OU variables de dépôt (mêmes noms). Le fichier .env.production est la méthode la plus fiable pour Vite.
      - name: Générer web/.env.production pour le build
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_EXPECTED_REF: ${{ secrets.VITE_SUPABASE_EXPECTED_REF || vars.VITE_SUPABASE_EXPECTED_REF }}
        run: node ./scripts/write-ci-env.mjs

      - name: Build (base /devflow/ via vite.config si GITHUB_ACTIONS)
        run: |
          npx tsc -b
          npx vite build
          node ./scripts/gh-pages-spa-fallback.mjs
        working-directory: web

      - name: SPA GitHub Pages (404.html = index.html)
        run: cp dist/index.html dist/404.html
        working-directory: web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
