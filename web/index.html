<!doctype html>
<html lang="fr">
  <head>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('devflow-ui')
          if (!raw) return
          var data = JSON.parse(raw)
          var theme = data && data.state && data.state.theme
          if (theme === 'light' || theme === 'dark') {
            document.documentElement.dataset.theme = theme
          }
        } catch (e) {}
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <title>DevFlow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
